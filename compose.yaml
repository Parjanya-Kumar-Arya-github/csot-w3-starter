services:
  api:
    # 1. REMOVE 'build: .'
    # 2. ADD the image you built and pushed to GitHub Container Registry
    image: ghcr.io/parjanya-kumar-arya-github/csot-w3-starter:latest
    volumes:
      - sqlite_data:/app/instance  # Keeps your SQLite DB safe between deployments
    restart: always

  web:
    image: nginx:alpine
    volumes:
      - ./nginx/default.conf:/etc/nginx/conf.d/default.conf:ro
    ports:
      - "0:80"  
    depends_on:
      - api
    restart: always

volumes:
  sqlite_data: