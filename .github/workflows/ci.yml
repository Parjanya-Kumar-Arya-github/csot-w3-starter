name: CI/CD Pipeline

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  lint-and-test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          pip install -r requirements-dev.txt

      - name: Secret Scan (TruffleHog)
        uses: trufflesecurity/trufflehog@main
        with:
          path: ./
          extra_args: --only-verified

      - name: Dependency Scan (pip-audit)
        run: |
          pip install pip-audit
          pip-audit -r requirements.txt || echo "Audit found vulnerabilities, check output"

      - name: Lint with Ruff
        run: ruff check .

      - name: Test and Coverage
        run: pytest --cov=app --cov-fail-under=70

  build-and-push:
    needs: lint-and-test
    runs-on: ubuntu-latest
    # Only push and deploy on main branch
    if: github.ref == 'refs/heads/main'
    permissions:
      packages: write
      contents: read
    steps:
      - uses: actions/checkout@v4

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Convert repository name to lowercase
        run: echo "REPO=${GITHUB_REPOSITORY,,}" >> ${GITHUB_ENV}

      - name: Build and push Docker image
        uses: docker/build-push-action@v5
        with:
          context: .
          push: true
          tags: ghcr.io/${{ env.REPO }}:latest

  deploy:
    needs: build-and-push 
    runs-on: ubuntu-latest
    if: github.ref == 'refs/heads/main'
    steps:
      - name: Execute SSH deployment
        uses: appleboy/ssh-action@v1.0.0
        with:
          host: ${{ secrets.DEPLOY_HOST }}
          port: ${{ secrets.DEPLOY_SSH_PORT }}
          username: ${{ secrets.DEPLOY_USER }}
          password: ${{ secrets.DEPLOY_PASSWORD }}
          script: |
            # 1. Navigate to your deployment path
            cd ${{ secrets.DEPLOY_PATH }}
            
            # 2. Download your latest compose.yaml
            curl -O -L https://raw.githubusercontent.com/${{ github.repository }}/main/compose.yaml
            
            # 3. Create the nginx directory and download the default.conf
            mkdir -p nginx
            curl -o nginx/default.conf -L https://raw.githubusercontent.com/${{ github.repository }}/main/nginx/default.conf
            
            # 4. Pull the latest Docker image and restart the containers
            docker compose -p ${{ secrets.COMPOSE_PROJECT_NAME }} up -d --pull always