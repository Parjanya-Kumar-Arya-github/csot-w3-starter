name: CI/CD Pipeline

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  lint-and-test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          pip install -r requirements-dev.txt

      - name: Secret Scan (TruffleHog)
        uses: trufflesecurity/trufflehog@main
        with:
          path: ./
          extra_args: --only-verified

      - name: Dependency Scan (pip-audit)
        run: |
          pip install pip-audit
          pip-audit -r requirements.txt || echo "Audit found vulnerabilities, check output"

      - name: Lint with Ruff
        run: ruff check .

      - name: Test and Coverage
        run: pytest --cov=app --cov-fail-under=70

  build-and-push:
    needs: lint-and-test
    runs-on: ubuntu-latest
    # Only push and deploy on main branch
    if: github.ref == 'refs/heads/main'
    permissions:
      packages: write
      contents: read
    steps:
      - uses: actions/checkout@v4

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Convert repository name to lowercase
        run: echo "REPO=${GITHUB_REPOSITORY,,}" >> ${GITHUB_ENV}

      - name: Build and push Docker image
        uses: docker/build-push-action@v5
        with:
          context: .
          push: true
          tags: ghcr.io/${{ env.REPO }}:latest

  deploy:
    needs: build-and-push
    runs-on: ubuntu-latest
    if: github.ref == 'refs/heads/main'
    steps:
      - name: Deploy via SSH
        uses: appleboy/ssh-action@v1.0.3
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          host: ${{ secrets.DEPLOY_HOST }}
          username: ${{ secrets.DEPLOY_USER }}
          password: ${{ secrets.DEPLOY_PASSWORD }}
          port: ${{ secrets.DEPLOY_SSH_PORT }}
          envs: GITHUB_TOKEN
          script: |
            cd ${{ secrets.DEPLOY_PATH }}
            
            # 1. Bring down old containers to release any file locks
            docker compose -p ${{ secrets.COMPOSE_PROJECT_NAME }} down || true
            
            # 2. The Permission Fix: Run detached (-d) to prevent hanging, then wait 5s
            cat << 'EOF' > /tmp/cleanup.yaml
            services:
              cleaner:
                image: alpine
                volumes:
                  - .:/workspace
                command: sh -c "chmod -R 777 /workspace"
            EOF
            
            docker compose -p ${{ secrets.COMPOSE_PROJECT_NAME }} -f /tmp/cleanup.yaml up -d cleaner || true
            sleep 5
            
            # 3. Safely and completely empty the directory natively (including hidden files)
            find . -mindepth 1 -delete || true
            
            # 4. Download and extract fresh code
            curl -sL -H "Authorization: token $GITHUB_TOKEN" https://api.github.com/repos/${{ github.repository }}/tarball/${{ github.sha }} | tar -xz --strip-components=1
            
            # 5. Build and launch your application!
            docker compose -p ${{ secrets.COMPOSE_PROJECT_NAME }} up --build -d